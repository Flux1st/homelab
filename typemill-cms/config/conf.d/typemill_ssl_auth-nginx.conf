# =========================================================================
# HTTP -> HTTPS permanent redirect
# =========================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # First allow Docker healthcheck locally on port 80
    location ~ ^/(fpm-status|fpm-ping)$ {
        access_log off;
        
        allow 127.0.0.1;
        # Allow also the standard Docker bridge network gateway / internal IPs
        allow 172.16.0.0/12;   # Covers 172.17.0.1, 172.18.0.1, etc.
        allow 10.0.0.0/8;      # Covers Docker Compose custom networks occasionally
        allow 192.168.0.0/16;  # Catch-all for other local bridge variations
        
        deny all;
    
        # Explicitly define the root here so Nginx passes the script cleanly
        root /var/www/html;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm.sock;
    }
    
    # Redirect everything else
    location / {
        return 301 https://$host$request_uri;
    } 
}

# =========================================================================
# HTTPS requests processed
# =========================================================================

server {
    listen [::]:443 ssl;
    listen 443 ssl;
    server_name _;

    root /var/www/html;
    index index.php;

    # Redirect server error pages to the static page /50x.html
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/lib/nginx/html;
    }

    # =========================================================================
    # ROBOTS: Politely telling them to stay away, if you wish to do so
    # =========================================================================
    
    add_header X-Robots-Tag "noindex, nofollow, noarchive";

    location = /robots.txt {
        add_header  Content-Type  text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }
    
    # =========================================================================
    # SSL CERTS AND HTTP AUTH: Edit these to match your local setup
    # =========================================================================
    
    ssl_certificate /etc/ssl/certs/localhost+1.pem; 
    ssl_certificate_key /etc/ssl/certs/localhost+1-key.pem;

    auth_basic "Authentication required";
    auth_basic_user_file /etc/nginx/.htpasswd;
    
    # =========================================================================
    # CONTENT MARKDOWN DUMP special directory
    # =========================================================================

    location = /markdown-dump {
        return 301 /markdown-dump/;
    }

    # Handle everything inside the markdown-dump directory
    location ^~ /markdown-dump/ {
        root /var/www/html;
        index index.php;
        
        # Force any .php files *inside* this folder to execute via FPM
        location ~ \.php$ {
            fastcgi_pass unix:/run/php-fpm.sock;
            include fastcgi_params;
            fastcgi_index index.php;
            
            # Using $document_root$fastcgi_script_name is safe and clean here because we use 'root'
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # =========================================================================
    # TYPEMILL CMS
    # =========================================================================
    
    # This makes sure PHP query URLs don't break. Usually.
    location / {
        try_files $uri $uri/ /index.php?$args;
        rewrite (.*?)index\.php/*(.*) /$1$2 redirect;
        rewrite (^|/)\.(?!well-known\/) /index.php break;
        rewrite ^/(system|content|data|settings|(media\/files\/)) /index.php break;
    }


    # Pass the PHP scripts to PHP-FPM listening on php-fpm.sock
    location ~ \.php$ {
        #try_files $uri =404;
        #fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
        include fastcgi_params;
    }

    # Set the cache-control headers on assets to cache for 5 days
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml)$ {
        expires 5d;
    }

    # Deny access to . files, for security
    location ~ /\. {
        log_not_found off;
        deny all;
    }
}
